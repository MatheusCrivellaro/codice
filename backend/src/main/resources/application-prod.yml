spring:
  application:
    name: codice-api

  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      show-components: never

codice:
  admin:
    seed-secret: ${ADMIN_SEED_SECRET}
  google-books:
    api-key: ${GOOGLE_BOOKS_API_KEY:}
  lookup:
    cache-ttl-hours: 24
  jwt:
    secret: ${JWT_SECRET}
    expiration-seconds: 604800
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  storage:
    endpoint: ${R2_ENDPOINT}
    access-key: ${R2_ACCESS_KEY}
    secret-key: ${R2_SECRET_KEY}
    bucket: ${R2_BUCKET:codice-uploads}
    public-url: ${R2_PUBLIC_URL}
