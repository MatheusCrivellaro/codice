<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Códice — marketplace de livros usados com curadoria bibliófila. Acadêmicos, clássicos e edições raras." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="theme-color" content="#F7F3EC" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1A1714" media="(prefers-color-scheme: dark)" />
    <meta property="og:title" content="Códice" />
    <meta property="og:description" content="Livros usados com cuidado de bibliotecário." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,400&family=Inter:wght@400;500&family=Source+Serif+4:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
    <title>códice</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('codice.theme');
          var theme = stored === 'light' || stored === 'dark' ? stored : 'system';
          var dark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
